name: CI

on:
  push:
    branches: [ main, "feat/**" ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Compilar e executar testes
        run: |
          chmod +x mvnw
          ./mvnw test --no-transfer-progress
        env:
          JWT_SECRET: ci-test-jwt-secret-key-minimum-256-bits-for-testing-only

      - name: Publicar relatório de testes
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: target/surefire-reports/
          retention-days: 7

  code-quality:
    name: Qualidade do Código
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Verificar dependências vulneráveis (OWASP)
        run: |
          chmod +x mvnw
          ./mvnw dependency:resolve --no-transfer-progress
        continue-on-error: true

  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t bigode-autopecas-api:latest .
