spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;NON_KEYWORDS=VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
jwt.secret=test-jwt-secret-key-for-junit-tests-minimum-256-bits-here
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# Desabilita autoconfigure de e-mail nos testes
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration

# Actuator nos testes
management.endpoints.web.exposure.include=health

# Rate limiting desabilitado nos testes
rate-limit.enabled=false