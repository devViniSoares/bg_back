spring.application.name=backend

spring.datasource.url=jdbc:mysql://${DB_HOST:127.0.0.1}:3306/bigodeautopecas?createDatabaseIfNotExist=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

jwt.secret=${JWT_SECRET:bigode-autopecas-chave-secreta-minimo-256bits-troque-em-producao}
jwt.expiration=86400000
jwt.refresh-expiration=604800000

admin.email=${ADMIN_EMAIL:admin@bigodeautopecas.com}
admin.senha=${ADMIN_SENHA:admin123}
admin.nome=${ADMIN_NOME:Administrador}

cors.origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:5173}

# Actuator — apenas health e info expostos publicamente
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true
info.app.name=Bigode Auto Pecas API
info.app.version=1.0.0

# ViaCEP
viacep.base-url=https://viacep.com.br/ws

# E-mail (opcional — defina MAIL_HOST no .env para habilitar notificações)
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
