spring.application.name=backend

# ── Banco de dados (MySQL) ──────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/bigode_autopecas?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ─────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── JWT ─────────────────────────────────────────────────────────────────────
# Gere uma chave segura em produção: openssl rand -base64 64
jwt.secret=${JWT_SECRET:bigode-autopecas-chave-secreta-minimo-256bits-troque-em-producao}
jwt.expiration=86400000
